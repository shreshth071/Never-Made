<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Orders | Never Made</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .status-badge {
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        .s-confirmed  { background: rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.18); }
        .s-processing { background: rgba(234,179,8,0.12);   color:#eab308; border:1px solid rgba(234,179,8,0.3); }
        .s-shipped    { background: rgba(59,130,246,0.12);  color:#60a5fa; border:1px solid rgba(59,130,246,0.3); }
        .s-delivered  { background: rgba(34,197,94,0.12);   color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
        .s-cancelled  { background: rgba(239,68,68,0.10);   color:#f87171; border:1px solid rgba(239,68,68,0.25); }
        select option { background: #111; color:#fff; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-black/95 backdrop-blur border-b border-white/10 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-2xl font-black italic tracking-tighter">NEVER MADE</a>
            <span class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 border border-white/10 px-3 py-1 rounded-full">Admin Panel</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="adminEmail" class="text-xs text-white/40 font-mono hidden"></span>
            <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-white/50 hover:text-white transition">← Back to Site</a>
        </div>
    </header>

    <!-- Login Gate -->
    <div id="loginGate" class="flex items-center justify-center min-h-[80vh] px-6">
        <div class="w-full max-w-sm border border-white/10 bg-white/[0.03] p-10 text-center">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-2">Admin Access</h2>
            <p class="text-xs text-white/40 uppercase tracking-widest mb-8">Log in to view all orders</p>
            <input id="loginEmail" type="email" placeholder="Email" class="w-full bg-white/5 border border-white/15 px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-white transition mb-3">
            <input id="loginPass" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/15 px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-white transition mb-6">
            <button id="loginBtn" onclick="doLogin()" class="w-full bg-white text-black py-3 text-[11px] font-black uppercase tracking-[0.3em] hover:bg-gray-200 transition">Sign In</button>
            <p id="loginErr" class="text-red-400 text-xs mt-4 hidden"></p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="hidden max-w-[1200px] mx-auto px-6 py-12">

        <!-- Stats Bar -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="border border-white/10 bg-white/[0.03] p-6">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Total Orders</p>
                <p class="text-4xl font-black" id="statTotal">—</p>
            </div>
            <div class="border border-white/10 bg-white/[0.03] p-6">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Total Revenue</p>
                <p class="text-4xl font-black" id="statRevenue">—</p>
            </div>
            <div class="border border-white/10 bg-white/[0.03] p-6">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Confirmed</p>
                <p class="text-4xl font-black text-white" id="statConfirmed">—</p>
            </div>
            <div class="border border-white/10 bg-white/[0.03] p-6">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Delivered</p>
                <p class="text-4xl font-black text-green-400" id="statDelivered">—</p>
            </div>
        </div>

        <!-- Page Title + Search -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white/30">Firebase Firestore</span>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">All Orders</h1>
            </div>
            <div class="flex gap-3">
                <input id="searchInput" type="text" placeholder="Search by Order ID or Name..."
                    oninput="filterOrders()"
                    class="bg-white/5 border border-white/15 px-4 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:border-white transition w-64">
                <select id="statusFilter" onchange="filterOrders()" class="bg-white/5 border border-white/15 px-4 py-2 text-[11px] font-black uppercase text-white focus:outline-none transition">
                    <option value="">All Status</option>
                    <option value="Confirmed">Confirmed</option>
                    <option value="Processing">Processing</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Delivered">Delivered</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
                <button onclick="loadAllOrders()" class="bg-white text-black px-4 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-gray-200 transition">Refresh</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="text-center py-20 text-white/30 text-sm uppercase tracking-widest font-black">Loading orders from Firebase...</div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 text-white/30 text-sm uppercase tracking-widest font-black">No orders found.</div>

        <!-- Orders Table -->
        <div id="ordersTable" class="hidden">
            <div class="border border-white/10 overflow-hidden">
                <!-- Table Header -->
                <div class="grid grid-cols-[1fr_1.5fr_1fr_1fr_1fr_1fr] gap-4 px-6 py-3 bg-white/5 text-[9px] font-black uppercase tracking-[0.2em] text-white/40 border-b border-white/10">
                    <span>Order ID</span>
                    <span>Customer</span>
                    <span>Items</span>
                    <span>Total</span>
                    <span>Date</span>
                    <span>Status</span>
                </div>
                <!-- Rows -->
                <div id="orderRows"></div>
            </div>
            <p class="text-[9px] text-white/25 uppercase tracking-widest text-center mt-6 font-black" id="orderCount"></p>
        </div>

    </div>

    <!-- Order Detail Modal -->
    <div id="modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-[#080808] border border-white/15 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
                <h3 class="font-black text-lg uppercase italic tracking-tighter" id="modalTitle">Order Detail</h3>
                <button onclick="closeModal()" class="text-white/40 hover:text-white text-2xl leading-none">×</button>
            </div>
            <div id="modalBody" class="px-6 py-6 space-y-6"></div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script type="module" src="../auth.js"></script>

    <script>
        let allOrders = [];

        // ── Auth ──────────────────────────────────────────────────────────────────
        function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass  = document.getElementById('loginPass').value;
            const err   = document.getElementById('loginErr');
            err.classList.add('hidden');

            if (!email || !pass) { showErr('Please enter email and password.'); return; }

            // Use global login function once loaded
            const tryLogin = setInterval(() => {
                if (window.auth && window.login) {
                    clearInterval(tryLogin);
                    window.login(email, pass, null); // null = stay on this page
                }
            }, 100);
        }

        function showErr(msg) {
            const err = document.getElementById('loginErr');
            err.textContent = msg;
            err.classList.remove('hidden');
        }

        // Listen for auth state and auto-load dashboard
        const authPoll = setInterval(() => {
            if (window.auth) {
                clearInterval(authPoll);
                window.auth.onAuthStateChanged(user => {
                    if (user) {
                        document.getElementById('loginGate').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        document.getElementById('adminEmail').textContent = user.email;
                        document.getElementById('adminEmail').classList.remove('hidden');
                        loadAllOrders();
                    } else {
                        document.getElementById('loginGate').classList.remove('hidden');
                        document.getElementById('dashboard').classList.add('hidden');
                    }
                });
            }
        }, 100);

        // ── Load Orders ───────────────────────────────────────────────────────────
        async function loadAllOrders() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingState').textContent = 'Loading orders from Firebase...';
            document.getElementById('ordersTable').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            try {
                const { collectionGroup, getDocs, query, orderBy } = window.Firestore;
                const db = window.db;

                const q = query(collectionGroup(db, 'orders'), orderBy('placedAt', 'desc'));
                const snap = await getDocs(q);

                allOrders = [];
                snap.forEach(doc => allOrders.push(doc.data()));

                updateStats(allOrders);
                renderOrders(allOrders);
            } catch(e) {
                console.error(e);
                const loadingText = document.getElementById('loadingState');
                if (e.message.includes('requires an index')) {
                    loadingText.innerHTML = `
                        <div class="space-y-4 max-w-sm mx-auto">
                            <p class="text-red-400 font-bold uppercase">Firestore Index Required</p>
                            <p class="text-[10px] text-white/50 lowercase leading-relaxed">this subcollection query needs an index. please click the link below to automatically create it in your firebase console:</p>
                            <a href="${e.message.split('here:').pop().trim()}" target="_blank" 
                                class="inline-block bg-white text-black px-6 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-gray-200 transition">Create Index Now</a>
                        </div>`;
                } else {
                    loadingText.textContent = 'Error: ' + e.message;
                    // Fallback to local storage if not index error
                    allOrders = JSON.parse(localStorage.getItem('nm_orders') || '[]').reverse();
                    if (allOrders.length > 0) {
                        updateStats(allOrders);
                        renderOrders(allOrders);
                    }
                }
            }
        }

        function updateStats(orders) {
            const total    = orders.length;
            const revenue  = orders.reduce((s, o) => s + (o.total || 0), 0);
            const confirmed = orders.filter(o => o.status === 'Confirmed').length;
            const delivered = orders.filter(o => o.status === 'Delivered').length;

            document.getElementById('statTotal').textContent     = total;
            document.getElementById('statRevenue').textContent   = '₹' + revenue.toLocaleString();
            document.getElementById('statConfirmed').textContent = confirmed;
            document.getElementById('statDelivered').textContent = delivered;
        }

        function renderOrders(orders) {
            document.getElementById('loadingState').classList.add('hidden');

            if (!orders.length) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('ordersTable').classList.add('hidden');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('ordersTable').classList.remove('hidden');
            document.getElementById('orderCount').textContent = orders.length + ' order(s) shown';

            const rows = orders.map((o, i) => {
                const addr  = o.address;
                const customer = addr ? addr.name : '—';
                const items = (o.items || []);
                const itemsText = items.length === 1
                    ? items[0].name
                    : items[0]?.name + ` +${items.length - 1} more`;
                const date  = o.placedAt ? new Date(o.placedAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';
                const sc    = statusClass(o.status);

                return `<div class="grid grid-cols-[1fr_1.5fr_1fr_1fr_1fr_1fr] gap-4 px-6 py-4 border-b border-white/5 hover:bg-white/[0.03] cursor-pointer transition items-center" onclick="openModal(${i})">
                    <span class="text-[11px] font-black text-white">#${o.id || '—'}</span>
                    <span class="text-[11px] text-white/70 truncate">${customer}</span>
                    <span class="text-[10px] text-white/50 truncate">${itemsText || '—'}</span>
                    <span class="text-[11px] font-black">₹${(o.total || 0).toLocaleString()}</span>
                    <span class="text-[10px] text-white/50">${date}</span>
                    <div class="flex items-center gap-2">
                        <span class="status-badge ${sc}">${o.status || 'Confirmed'}</span>
                        <select class="bg-transparent text-[9px] text-white/30 border border-white/10 px-1 py-0.5 cursor-pointer hover:border-white/40 transition focus:outline-none"
                            onclick="event.stopPropagation()"
                            onchange="updateStatus('${o.id}', this.value)">
                            <option value="">Update</option>
                            <option value="Confirmed">Confirmed</option>
                            <option value="Processing">Processing</option>
                            <option value="Shipped">Shipped</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('orderRows').innerHTML = rows;
        }

        function filterOrders() {
            const q      = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allOrders.filter(o => {
                const matchSearch = !q || (o.id || '').toLowerCase().includes(q)
                    || (o.address?.name || '').toLowerCase().includes(q)
                    || (o.items || []).some(i => i.name.toLowerCase().includes(q));
                const matchStatus = !status || o.status === status;
                return matchSearch && matchStatus;
            });

            renderOrders(filtered);
        }

        function statusClass(status) {
            const map = { Confirmed:'s-confirmed', Processing:'s-processing', Shipped:'s-shipped', Delivered:'s-delivered', Cancelled:'s-cancelled' };
            return map[status] || 's-confirmed';
        }

        // ── Status Update ─────────────────────────────────────────────────────────
        async function updateStatus(orderId, newStatus) {
            if (!newStatus) return;
            try {
                const { collectionGroup, getDocs, doc, updateDoc, query } = window.Firestore;
                const db = window.db;

                // Find the doc across users
                const q = query(collectionGroup(db, 'orders'));
                const snap = await getDocs(q);
                let found = false;
                
                for (const d of snap.docs) {
                    if (d.data().id === orderId) {
                        await updateDoc(d.ref, { status: newStatus });
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    // Check localStorage
                    let localOrders = JSON.parse(localStorage.getItem('nm_orders') || '[]');
                    let idx = localOrders.findIndex(o => o.id === orderId);
                    if (idx !== -1) {
                        localOrders[idx].status = newStatus;
                        localStorage.setItem('nm_orders', JSON.stringify(localOrders));
                    }
                }

                // Update local array too
                const order = allOrders.find(o => o.id === orderId);
                if (order) order.status = newStatus;
                updateStats(allOrders);
                filterOrders();
            } catch(e) {
                alert('Update failed: ' + e.message);
            }
        }

        // ── Modal ─────────────────────────────────────────────────────────────────
        function openModal(idx) {
            const o = allOrders[idx];
            if (!o) return;

            const items = (o.items || []).map(item => `
                <div class="flex items-center gap-4 py-3 border-b border-white/5 last:border-0">
                    <div class="w-12 h-16 bg-white/5 overflow-hidden flex-shrink-0">
                        <img src="../${item.image || ''}" class="w-full h-full object-cover" onerror="this.style.display='none'">
                    </div>
                    <div class="flex-1">
                        <p class="text-xs font-black uppercase tracking-wider">${item.name}</p>
                        <p class="text-[10px] text-white/40 mt-1">Size: ${item.size} · Qty: ${item.quantity} · ₹${(item.price||0).toLocaleString()}</p>
                    </div>
                </div>`).join('');

            const addr = o.address;
            const addrText = addr
                ? `${addr.name} · ${addr.phone}<br>${addr.street}, ${addr.city}, ${addr.state} — ${addr.pincode}`
                : 'Not available';

            document.getElementById('modalTitle').textContent = 'Order #' + (o.id || '—');
            document.getElementById('modalBody').innerHTML = `
                <div class="grid grid-cols-2 gap-4 text-[10px]">
                    <div><span class="text-white/30 uppercase tracking-widest">Date</span><p class="font-black mt-1">${o.placedAt ? new Date(o.placedAt).toLocaleString('en-IN') : '—'}</p></div>
                    <div><span class="text-white/30 uppercase tracking-widest">Status</span><p class="mt-1"><span class="status-badge ${statusClass(o.status)}">${o.status || 'Confirmed'}</span></p></div>
                    <div><span class="text-white/30 uppercase tracking-widest">Payment</span><p class="font-black mt-1 uppercase">${o.paymentMethod || '—'}</p></div>
                    <div><span class="text-white/30 uppercase tracking-widest">Total</span><p class="font-black mt-1">₹${(o.total||0).toLocaleString()}</p></div>
                </div>
                <div>
                    <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-3">Items</p>
                    ${items}
                </div>
                <div>
                    <p class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Delivery Address</p>
                    <p class="text-[11px] text-white/60 leading-relaxed">${addrText}</p>
                </div>`;

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        // Login button via keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !document.getElementById('loginGate').classList.contains('hidden')) doLogin();
        });

        // Global export for status update
        window.updateStatus = updateStatus;
        window.loadAllOrders = loadAllOrders;
        window.filterOrders = filterOrders;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.doLogin = doLogin;

    </script>
</body>
</html>
