<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Never Made Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:ital,wght@0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-input {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-input:focus {
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .marquee-bg {
            animation: marquee 60s linear infinite;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body
    class="nm-site bg-black text-white font-sans antialiased overflow-x-hidden selection:bg-white selection:text-black">



    <!-- Return to Home -->
    <a href="index.html"
        class="absolute left-6 top-6 z-[100] flex items-center gap-3 px-6 py-3 nm-pill-ghost text-[10px] font-black uppercase tracking-widest transition-all duration-500 md:fixed md:left-8 md:top-8">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
    </a>

    <!-- Main Auth Center -->
    <main class="relative z-10 flex min-h-screen items-center justify-center px-6 pb-12 pt-16 md:p-6"
        x-data="{ mode: 'login' }">

        <div class="nm-layout-panel w-full max-w-md rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden h-auto">

            <!-- Logo Accent -->
            <div class="mb-4 text-center">
                <span
                    class="text-4xl font-black italic tracking-tighter uppercase inline-block border-b-2 border-white mb-1">NM</span>
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.4em]">Establish Identity / Never Made
                </p>
            </div>

            <!-- Login Section -->
            <div x-show="mode === 'login'" x-transition:enter="transition ease-out duration-500 delay-200"
                x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
                class="space-y-6">

                <h2 class="text-3xl font-black uppercase italic tracking-tighter text-center">Sign In</h2>

                <div class="space-y-4" x-data="{ email: '', password: '', loading: false }">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Email
                            Address</label>
                        <input type="email" x-model="email" placeholder="YOUR@EMAIL.COM"
                            class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Password</label>
                            <button @click="mode = 'forgot'"
                                class="text-[8px] font-bold uppercase tracking-widest text-gray-600 hover:text-white transition">Forgot?</button>
                        </div>
                        <input type="password" x-model="password" placeholder="••••••••"
                            class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                    </div>
                    <button @click="loading = true; window.login(email, password).finally(() => loading = false)"
                        :disabled="loading"
                        class="w-full bg-white text-black py-5 text-xs font-black uppercase tracking-[0.3em] rounded-xl hover:invert transition duration-500 shadow-xl shadow-white/5 disabled:opacity-50 disabled:cursor-wait">
                        <span x-show="!loading">Establish Connection</span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Processing...
                        </span>
                    </button>

                    <!-- Magic Link Option -->
                    <div class="text-center">
                        <button @click="window.signInWithMagicLink(email)"
                            class="text-[8px] font-bold uppercase tracking-[0.2em] text-gray-500 hover:text-white transition">
                            Or Send Magic Link to Email
                        </button>
                    </div>
                </div>

                <!-- Social Login Section -->
                <div class="space-y-4 pt-4 border-t border-white/5">
                    <p class="text-[9px] font-bold text-gray-600 uppercase tracking-[0.4em] text-center">Social
                        Authentication</p>

                    <button @click="window.signInWithGoogle()"
                        class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 text-white py-4 text-[10px] font-bold uppercase tracking-[0.2em] rounded-xl hover:bg-white/10 transition">
                        <svg class="w-4 h-4" viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="currentColor"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="currentColor"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                            <path fill="currentColor"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Continue with Google
                    </button>
                </div>

                <div class="pt-4 text-center border-t border-white/5">
                    <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-4">New to the collective?
                    </p>
                    <button @click="mode = 'signup'"
                        class="text-xs font-black uppercase tracking-[0.2em] border-b border-white hover:text-gray-400 hover:border-gray-400 transition-colors pb-1">Create
                        Account</button>
                </div>
            </div>

            <!-- Forgot Password Section -->
            <div x-show="mode === 'forgot'" x-transition:enter="transition ease-out duration-500 delay-200"
                x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
                class="space-y-6" x-cloak>

                <h2 class="text-3xl font-black uppercase italic tracking-tighter text-center">Reset Access</h2>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em] text-center mb-6">Enter your
                    isolated email to receive a recovery link.</p>

                <div class="space-y-4" x-data="{ forgotEmail: '', loading: false }">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Email
                            Address</label>
                        <input type="email" id="forgotEmail" x-model="forgotEmail" placeholder="YOUR@EMAIL.COM"
                            class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                    </div>

                    <button @click="loading = true; window.forgotPassword(forgotEmail).finally(() => loading = false)"
                        :disabled="loading || !forgotEmail"
                        class="w-full bg-white text-black py-5 text-xs font-black uppercase tracking-[0.3em] rounded-xl hover:invert transition duration-500 shadow-xl shadow-white/5 disabled:opacity-50 disabled:cursor-wait">
                        <span x-show="!loading">Send Reset Link</span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Transmitting...
                        </span>
                    </button>
                </div>

                <div class="pt-8 text-center border-t border-white/5">
                    <button @click="mode = 'login'"
                        class="text-[9px] font-black uppercase tracking-[0.2em] border-b border-white hover:text-gray-400 hover:border-gray-400 transition-colors pb-1">←
                        Return to Login</button>
                </div>
            </div>

            <!-- Signup Section -->
            <div x-show="mode === 'signup'" x-transition:enter="transition ease-out duration-500 delay-200"
                x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
                class="space-y-4" x-cloak>

                <h2 class="text-3xl font-black uppercase italic tracking-tighter text-center">Join Collective</h2>

                <div class="space-y-4" x-data="{ fname: '', lname: '', email: '', pass: '', loading: false }">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">First</label>
                            <input type="text" x-model="fname" placeholder="FIRST"
                                class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Last</label>
                            <input type="text" x-model="lname" placeholder="LAST"
                                class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Email</label>
                        <input type="email" x-model="email" placeholder="YOUR@EMAIL.COM"
                            class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Access Key</label>
                        <input type="password" x-model="pass" placeholder="••••••••"
                            class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                    </div>
                    <button
                        @click="loading = true; window.signup(email, pass, fname, lname).finally(() => loading = false)"
                        :disabled="loading"
                        class="w-full bg-white text-black py-4 text-xs font-black uppercase tracking-[0.3em] rounded-xl hover:invert transition duration-500 shadow-xl shadow-white/5 disabled:opacity-50 disabled:cursor-wait">
                        <span x-show="!loading">Register Identity</span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            ...
                        </span>
                    </button>
                </div>

                <div class="pt-2 text-center border-t border-white/5">
                    <p class="text-[9px] font-bold text-gray-600 uppercase tracking-widest mb-2">Already established?
                    </p>
                    <button @click="mode = 'login'"
                        class="text-xs font-black uppercase tracking-[0.2em] border-b border-white hover:text-gray-400 hover:border-gray-400 transition-colors pb-1">Sign
                        In instead</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Space Branding -->
    <div class="fixed bottom-8 w-full text-center z-10">
        <p class="text-[8px] font-black uppercase tracking-[0.5em] text-gray-600">© 2026 NEVER MADE STREETWEAR / ALL
            RIGHTS RESERVED / END OF LINE</p>
    </div>

    <!-- Scripts -->
    <script type="module" src="../auth.js"></script>
</body>

</html>
