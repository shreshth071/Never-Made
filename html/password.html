<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Never Made</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .glass-card {
            background: rgba(25, 25, 25, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-input {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: black;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-input:focus {
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="nm-site bg-black text-white font-sans antialiased overflow-hidden selection:bg-white selection:text-black">

    <!-- Brand Background Collage -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-20 filter grayscale contrast-125">
        <img src="../image/graffiti_collage.png" class="w-full h-full object-cover mix-blend-screen" alt="" onerror="this.style.display='none'">
    </div>

    <!-- Main Entry Center -->
    <main class="relative z-10 min-h-screen flex items-center justify-center p-6">
        
        <div class="w-full max-w-md glass-card rounded-3xl p-10 md:p-12 shadow-2xl relative overflow-hidden" x-data="{ newPass: '', loading: false, msg: '' }">
            
            <div class="mb-10 text-center">
                <span class="text-4xl font-black italic tracking-tighter uppercase inline-block border-b-4 border-white mb-2">NM</span>
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-[0.4em]">Establish New Protocol</p>
            </div>

            <div class="space-y-8">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter text-center">Update Password</h2>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em] text-center mb-6 leading-relaxed">Enter your new secure access key below. Once set, you will be authenticated.</p>
                
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold uppercase tracking-widest text-gray-500">New Password</label>
                        <input type="password" id="updatePassword" x-model="newPass" placeholder="••••••••" 
                            class="auth-input w-full px-6 py-4 text-xs font-bold uppercase tracking-widest rounded-xl">
                    </div>
                    
                    <button @click="loading = true; window.updatePassword(newPass).finally(() => loading = false)"
                        :disabled="loading || !newPass"
                        class="w-full bg-white text-black py-5 text-xs font-black uppercase tracking-[0.3em] rounded-xl hover:invert transition duration-500 shadow-xl shadow-white/5 disabled:opacity-50 disabled:cursor-wait">
                        <span x-show="!loading">Set New Password</span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            Validating...
                        </span>
                    </button>
                </div>
            </div>

            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white/5 blur-[80px] rounded-full"></div>
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-white/5 blur-[80px] rounded-full"></div>
        </div>
    </main>

    <script type="module" src="../auth.js"></script>
    <script>
        // Check if we arrived without a hash token, warn user
        setTimeout(() => {
            if (!window.location.hash.includes('access_token')) {
                console.warn("No recovery token found in url. This page only works straight from the email link.");
            }
        }, 1000);
    </script>
</body>
</html>
