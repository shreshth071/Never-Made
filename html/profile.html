<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Never Made Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <!-- Load scripts BEFORE Alpine so functions are available -->
    <script src="../script.js"></script>
    <script type="module" src="../auth.js"></script>

    <!-- Alpine must load AFTER above scripts -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-mesh text-white font-sans antialiased overflow-x-hidden min-h-screen" x-data="profileApp()">

    <div class="scanline"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 border-b border-white/5 bg-black/20 backdrop-blur-2xl">
        <div class="mx-auto max-w-[1200px] px-6">
            <div class="flex h-16 items-center justify-between">
                <a href="index.html" class="text-xl font-black italic uppercase tracking-tighter text-glow">NEVER MADE</a>
                <div class="flex items-center space-x-8 text-[9px] font-black uppercase tracking-[0.3em]">
                    <a href="shop.html" class="hover:text-white/60 transition-colors">Shop</a>
                    <a href="index.html" class="hover:text-white/60 transition-colors">Home</a>
                    <button onclick="logout()" class="text-red-500 hover:text-red-400 transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="mx-auto max-w-[900px] px-6 pt-10 pb-24">

        <!-- Access Denied -->
        <template x-if="!$store.auth.isLoggedIn && !$store.auth.loading && !$store.auth.profile">
            <div class="glass-card flex flex-col items-center justify-center rounded-2xl p-16 text-center">
                <div class="mb-6 h-[2px] w-16 bg-red-500"></div>
                <h2 class="mb-4 text-3xl font-black italic uppercase tracking-tighter">Access Denied</h2>
                <p class="mb-10 max-w-xs text-xs font-bold uppercase leading-loose tracking-[0.2em] text-white/40">Please log in to access your profile.</p>
                <a href="index.html" class="border border-white/20 bg-white px-10 py-4 text-[10px] font-black uppercase tracking-[0.3em] text-black hover:invert transition-all duration-500">Return Home</a>
            </div>
        </template>

        <!-- Profile Content -->
        <div x-show="$store.auth.isLoggedIn || $store.auth.profile" x-cloak class="space-y-8">

            <!-- Header -->
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-white/10 pb-8">
                <div class="space-y-2">
                    <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white/30">Authorized User</span>
                    <h1 class="text-5xl font-black italic uppercase tracking-tighter text-glow" x-text="'Hi, ' + profileData.firstName"></h1>
                    <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-white/40">Manage your account details</p>
                </div>
                <button @click="editMode = !editMode"
                    class="glass-card group relative px-8 py-4 text-[10px] font-black uppercase tracking-[0.3em] overflow-hidden whitespace-nowrap">
                    <span class="relative z-10 group-hover:opacity-0 transition-opacity duration-300" x-text="editMode ? 'Cancel' : 'Edit Profile'"></span>
                    <span class="absolute inset-0 flex items-center justify-center text-black font-black opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-white z-20 text-[10px] uppercase tracking-[0.3em]" x-text="editMode ? 'Cancel' : 'Edit'"></span>
                </button>
            </header>

            <!-- Fields Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Identity Card -->
                <section class="glass-card rounded-xl p-6 space-y-6">
                    <div class="border-b border-white/5 pb-3">
                        <span class="text-[9px] font-black uppercase tracking-[0.3em] text-white/25">01 // Identity</span>
                    </div>
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-white/35">First Name</label>
                            <input type="text" x-model="profileData.firstName" :readonly="!editMode"
                                class="w-full px-4 py-3 text-sm font-black uppercase tracking-tight focus:outline-none focus:ring-1 focus:ring-white/20 transition-all border"
                                :class="editMode ? 'bg-white/10 border-white/20 text-white' : 'bg-transparent border-transparent text-white/60 cursor-default'">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-white/35">Last Name</label>
                            <input type="text" x-model="profileData.lastName" :readonly="!editMode"
                                class="w-full px-4 py-3 text-sm font-black uppercase tracking-tight focus:outline-none focus:ring-1 focus:ring-white/20 transition-all border"
                                :class="editMode ? 'bg-white/10 border-white/20 text-white' : 'bg-transparent border-transparent text-white/60 cursor-default'">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-white/35 flex items-center gap-2">
                                Email
                                <span class="text-white/20 text-[8px] normal-case tracking-normal font-normal">(login email)</span>
                            </label>
                            <input type="email" x-model="profileData.email" readonly
                                class="w-full bg-transparent border-transparent px-4 py-3 text-sm font-bold text-white/25 cursor-not-allowed focus:outline-none">
                        </div>
                    </div>
                </section>

                <!-- Contact Card -->
                <section class="glass-card rounded-xl p-6 space-y-6">
                    <div class="border-b border-white/5 pb-3">
                        <span class="text-[9px] font-black uppercase tracking-[0.3em] text-white/25">02 // Contact</span>
                    </div>
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase tracking-[0.2em] text-white/35">Mobile No.</label>
                            <input type="text" x-model="profileData.mobile" :readonly="!editMode" placeholder="+91 XXXX XXX XXX"
                                class="w-full px-4 py-3 text-sm font-black uppercase tracking-tight focus:outline-none focus:ring-1 focus:ring-white/20 transition-all border"
                                :class="editMode ? 'bg-white/10 border-white/20 text-white' : 'bg-transparent border-transparent text-white/60 cursor-default'">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[9px] font-black uppercase tracking-[0.2em] text-white/35">Age</label>
                                <input type="number" x-model="profileData.age" :readonly="!editMode" placeholder="XX"
                                    class="w-full px-4 py-3 text-sm font-black tracking-tight focus:outline-none focus:ring-1 focus:ring-white/20 transition-all border text-center"
                                    :class="editMode ? 'bg-white/10 border-white/20 text-white' : 'bg-transparent border-transparent text-white/60 cursor-default'">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[9px] font-black uppercase tracking-[0.2em] text-white/35">Gender</label>
                                <select x-model="profileData.gender" :disabled="!editMode"
                                    class="w-full px-4 py-3 text-sm font-black uppercase tracking-tight focus:outline-none transition-all appearance-none border text-center"
                                    :class="editMode ? 'bg-white/10 border-white/20 text-white cursor-pointer' : 'bg-transparent border-transparent text-white/60 cursor-default'">
                                    <option class="bg-stone-900" value="Male">Male</option>
                                    <option class="bg-stone-900" value="Female">Female</option>
                                    <option class="bg-stone-900" value="Other">Other</option>
                                    <option class="bg-stone-900" value="Prefer not to say">N/A</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Address Card -->
                <section class="glass-card rounded-xl p-6 space-y-5 md:col-span-2">
                    <div class="border-b border-white/5 pb-3">
                        <span class="text-[9px] font-black uppercase tracking-[0.3em] text-white/25">03 // Delivery Address</span>
                    </div>
                    <textarea x-model="profileData.primaryAddress" :readonly="!editMode" placeholder="Enter your primary delivery address..."
                        class="w-full min-h-[90px] p-4 text-sm font-black uppercase tracking-tight focus:outline-none focus:ring-1 focus:ring-white/20 transition-all resize-none leading-relaxed border"
                        :class="editMode ? 'bg-white/10 border-white/20 text-white' : 'bg-transparent border-transparent text-white/60 cursor-default'"></textarea>
                </section>

                <!-- Save Button -->
                <div x-show="editMode" class="md:col-span-2 flex justify-center pt-4">
                    <button @click="saveProfile()"
                        class="relative px-20 py-5 bg-white text-black text-[10px] font-black uppercase tracking-[0.5em] hover:scale-[1.02] transition-all duration-500 shadow-[0_0_30px_rgba(255,255,255,0.08)] group overflow-hidden">
                        <span class="relative z-10" x-text="saving ? 'Saving...' : 'Save Changes'"></span>
                        <div class="absolute inset-0 bg-gray-200 translate-x-full group-hover:translate-x-0 transition-transform duration-500"></div>
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Success Toast -->
    <div x-show="showToast"
        x-transition:enter="transition ease-out duration-500"
        x-transition:enter-start="translate-y-4 opacity-0"
        x-transition:enter-end="translate-y-0 opacity-100"
        x-transition:leave="transition ease-in duration-300"
        x-transition:leave-start="translate-y-0 opacity-100"
        x-transition:leave-end="translate-y-4 opacity-0"
        class="fixed bottom-8 right-8 z-[100] glass-card rounded-xl border-white/20 px-8 py-4 text-[9px] font-black uppercase tracking-[0.3em] flex items-center gap-4"
        style="display:none">
        <div class="h-6 w-[2px] bg-white"></div>
        <span>Profile Saved ✓</span>
    </div>

    <!-- Profile App Logic -->
    <script>
        function profileApp() {
            return {
                editMode: false,
                saving: false,
                showToast: false,
                profileData: {
                    firstName: '',
                    lastName: '',
                    email: '',
                    mobile: '',
                    age: '',
                    gender: 'Prefer not to say',
                    primaryAddress: ''
                },

                init() {
                    // Load from store if already populated
                    const stored = JSON.parse(localStorage.getItem('nm-profile') || 'null');
                    if (stored) {
                        this.profileData = { ...this.profileData, ...stored };
                    }

                    // Watch for auth store profile changes (fires after Firestore loads)
                    this.$watch('$store.auth.profile', (value) => {
                        if (value) {
                            this.profileData = { ...this.profileData, ...value };
                        }
                    });
                },

                async saveProfile() {
                    this.saving = true;
                    try {
                        const { createdAt, ...updateData } = this.profileData;

                        // Save to Alpine store
                        const authStore = window.Alpine.store('auth');
                        const updatedProfile = { ...(authStore.profile || {}), ...updateData };
                        authStore.profile = updatedProfile;

                        // Save to localStorage
                        localStorage.setItem('nm-profile', JSON.stringify(updatedProfile));

                        // Save to Firestore if logged in
                        if (window.auth && window.auth.currentUser && window.Firestore) {
                            const { setDoc, doc } = window.Firestore;
                            await setDoc(doc(window.db, 'users', window.auth.currentUser.uid), updateData, { merge: true });
                        }

                        // Refresh local display data with saved values
                        this.profileData = { ...this.profileData, ...updatedProfile };

                        // Show success & exit edit mode
                        this.editMode = false;
                        this.showToast = true;
                        setTimeout(() => { this.showToast = false; }, 3000);
                    } catch (err) {
                        console.error('Save failed:', err);
                        alert('Could not save profile. Please try again.');
                    } finally {
                        this.saving = false;
                    }
                }
            };
        }
    </script>

</body>
</html>
