<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Never Made Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:ital,wght@0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<body class="bg-black text-white font-sans antialiased overflow-x-hidden" 
    x-data="{ 
        editMode: false,
        profileData: {
            firstName: '',
            lastName: '',
            email: '',
            mobile: '',
            age: '',
            gender: 'Prefer not to say',
            primaryAddress: ''
        },
        init() {
            // Watch for auth profile changes
            this.$watch('$store.auth.profile', (value) => {
                if (value) {
                    this.profileData = { ...this.profileData, ...value };
                }
            });
            // Initial load if already logged in
            if (window.Alpine.store('auth').profile) {
                this.profileData = { ...this.profileData, ...window.Alpine.store('auth').profile };
            }
        },
        async saveProfile() {
            const { email, createdAt, ...updateData } = this.profileData;
            await window.updateUserProfile(updateData);
            this.editMode = false;
        }
    }">

    <!-- Navigation (Simplified for Profile) -->
    <nav class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-[1400px] mx-auto px-6">
            <div class="flex justify-between items-center h-24">
                <a href="index.html" class="text-2xl font-black tracking-[-0.05em] uppercase italic">NEVER MADE</a>
                <div class="flex items-center space-x-8 text-[11px] font-bold uppercase tracking-[0.2em]">
                    <a href="shop.html" class="nav-link-light">Shop</a>
                    <a href="index.html" class="nav-link-light">Home</a>
                    <button onclick="logout()" class="nav-link text-red-500">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Profile Content -->
    <main class="max-w-[800px] mx-auto pt-20 pb-32 px-6">
        
        <!-- Private Access Check -->
        <template x-if="!$store.auth.isLoggedIn && !$store.auth.loading">
            <div class="text-center py-20 border border-white/10 rounded-2xl bg-[#050505]">
                <h2 class="text-3xl font-black uppercase italic mb-6">Private Access</h2>
                <p class="text-gray-500 text-sm mb-10 max-w-[400px] mx-auto uppercase tracking-widest leading-loose">Please log in to view and manage your profile settings.</p>
                <a href="index.html" class="inline-block bg-white text-black px-12 py-5 text-xs font-black uppercase tracking-[0.3em] hover:invert transition duration-500">Return Home</a>
            </div>
        </template>

        <!-- Profile Page Header -->
        <div x-show="$store.auth.isLoggedIn" x-cloak class="mb-16 flex flex-col md:flex-row justify-between items-start md:items-end gap-6 border-b border-white/10 pb-12">
            <div>
                <h1 class="text-5xl font-black uppercase italic tracking-tighter mb-4" x-text="'Hi, ' + profileData.firstName"></h1>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em]">Manage your account details and preferences</p>
            </div>
            <button @click="editMode = !editMode" 
                class="px-8 py-3 text-[10px] font-black uppercase tracking-widest border border-white/20 hover:border-white transition-all flex items-center gap-2">
                <span x-text="editMode ? 'CANCEL EDITING' : 'EDIT PROFILE'"></span>
            </button>
        </div>

        <!-- Profile Fields -->
        <div x-show="$store.auth.isLoggedIn" x-cloak class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
            
            <!-- Full Name -->
            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">First Name</label>
                <input type="text" x-model="profileData.firstName" :readonly="!editMode"
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold uppercase transition-all focus:outline-none focus:border-white"
                    :class="editMode ? 'border-white/30 text-white' : 'border-transparent text-white/60 cursor-default'">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">Last Name</label>
                <input type="text" x-model="profileData.lastName" :readonly="!editMode"
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold uppercase transition-all focus:outline-none focus:border-white"
                    :class="editMode ? 'border-white/30 text-white' : 'border-transparent text-white/60 cursor-default'">
            </div>

            <!-- Contact Info -->
            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">Email Address (Primary)</label>
                <input type="email" x-model="profileData.email" readonly
                    class="w-full bg-transparent border-b border-transparent py-3 text-lg font-bold text-white/40 cursor-default focus:outline-none">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">Mobile No.</label>
                <input type="text" x-model="profileData.mobile" :readonly="!editMode" placeholder="+91 XXXX XXX XXX"
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold uppercase transition-all focus:outline-none focus:border-white"
                    :class="editMode ? 'border-white/30 text-white' : 'border-transparent text-white/60 cursor-default'">
            </div>

            <!-- Demographics -->
            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">Age</label>
                <input type="number" x-model="profileData.age" :readonly="!editMode" placeholder="XX"
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold uppercase transition-all focus:outline-none focus:border-white"
                    :class="editMode ? 'border-white/30 text-white' : 'border-transparent text-white/60 cursor-default'">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">Gender</label>
                <select x-model="profileData.gender" :disabled="!editMode"
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold uppercase transition-all focus:outline-none focus:border-white appearance-none"
                    :class="editMode ? 'border-white/30 text-white' : 'border-transparent text-white/60 cursor-default'">
                    <option class="bg-black" value="Male">Male</option>
                    <option class="bg-black" value="Female">Female</option>
                    <option class="bg-black" value="Other">Other</option>
                    <option class="bg-black" value="Prefer not to say">Prefer not to say</option>
                </select>
            </div>

            <!-- Address -->
            <div class="md:col-span-2 space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 block">Primary Delivery Address</label>
                <textarea x-model="profileData.primaryAddress" :readonly="!editMode" placeholder="Enter your main shipping address..."
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold uppercase transition-all focus:outline-none focus:border-white min-h-[100px] resize-none"
                    :class="editMode ? 'border-white/30 text-white' : 'border-transparent text-white/60 cursor-default'"></textarea>
            </div>

            <!-- Save Toolbar -->
            <div x-show="editMode" x-cloak class="md:col-span-2 pt-12 flex justify-center">
                <button @click="saveProfile()" 
                    class="bg-white text-black px-20 py-5 text-sm font-black uppercase tracking-[0.4em] hover:bg-gray-200 transition-all duration-500 shadow-2xl shadow-white/5">
                    Save Changes
                </button>
            </div>

        </div>

    </main>

    <!-- Footer Space -->
    <div class="h-10"></div>

    <!-- Scripts -->
    <script src="../script.js"></script>
    <script type="module" src="../auth.js"></script>
</body>

</html>
